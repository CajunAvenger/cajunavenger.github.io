<html>
<head>
<style>
#grid {
	display: grid;
	grid-template-columns: 315vw;
	grid-template-rows: 315vh;
	background-size: 25px 25px;
	background-image:
		linear-gradient(to right, gainsboro 1px, transparent 1px),
		linear-gradient(to bottom, gainsboro 1px, transparent 1px);
	position: absolute;
	top: 2.5em;
}
#header {
	position: fixed;
	height: 2em;
	width: 315vw;
	z-index: 2000;
}
@media (pointer:coarse) {
	#grid {
		grid-template-columns: 100vw;
	}
	#header {
		width: 100vw;
	}
}
#ribbon {
	background-color: white;
	position: relative;
	border: 1px solid black;
	padding: 6px;
}
#modal {
	z-index: 3000;
	position: fixed;
	width: 25%;
	margin-left: 37%;
	top: 15%;
	border: 1px solid black;
	padding: 10px;
	background: white;
}
.holdbox {
	position: absolute;
	background: white;
	color: black;
	display: flex;
	justify-content: center;
	flex-direction: column;
	border: 1px solid black;
	z-index: 1;
}
.holdbox.autosize {
	width: auto;
	height: auto;
	padding: 5px;
}
.flex-line {
	pointer-events: none;
	-webkit-touch-callout: none;
	-webkit-user-select: none;
	-khtml-user-select: none;
	-moz-user-select: none;
	-ms-user-select: none;
	user-select: none;
}
.round {
	border-radius: 50%;
}
.round.wide {
	border-radius: 50%/100%;
}
.round.tall {
	border-radius: 100%/50%;
}
.hold-canvas {
	position: absolute;
	background: transparent;
	z-index: 1000;
}
.whinput {
	width: 4em;
}
.label {
	display: inline-block;
	width: 6em;
}
.line {
	background-color: #000000;
	color: transparent;
	height: 3px;
	margin: 5px;
	pointer-events: none;
	position: relative;
	top: 0.45em;
	display: inline-block;
}
#sketcher {
	position: absolute;
	top: 0;
	left: 0;
	background: transparent;
	z-index: -1;
}
input[type="color"] {
	border-radius: 50%;
	height: 1.5em;
	width: 1.5em;
	border: 1px solid #666;
}
.linkline {
	z-index: 0;
	position: absolute;
}
.selected {
	box-shadow: 0px 0px 10px #0f0;
}
</style>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
<script src="drag-drop-touch.esm.min.js?autoload" type="module"></script>
<script>
	let counter = 0;
	let linkcount = 0;
	let sketching = [];
	let eleSaveData = {};
	let links = {};
	let selection = [];
	let autosave;
	let selecting_box = [];
	let selecting_timer;
	
	let default_height = "auto";
	let default_width = "auto";
	
	let hasMouse = false;

	function newInit() {
		hasMouse = matchMedia('(pointer:fine)').matches;
		if(!hasMouse)
			document.getElementById("dbl").innerText = "Long press";
		
		let sk = document.getElementById("sketcher")
		sk.width = 2*window.screen.width;
		sk.height = 2*window.screen.height;
		
		loadData();
	}

	// drag event handlers
	// allow dropin
	function dragoverHandler(ev) {
		ev.preventDefault();
	}
	// cache drag data
	function dragstartHandler(ev) {
		ev.dataTransfer.setData("text", ev.target.id);
		ev.dataTransfer.setData("X", parseInt(ev.clientX));
		ev.dataTransfer.setData("Y", parseInt(ev.clientY));
	}
	// handle data after a drop
	function dropHandler(ev) {
		ev.preventDefault();
		let dropping = document.getElementById(ev.dataTransfer.getData("text"));
		let startLeft = dropping.offsetLeft;
		let startTop = dropping.offsetTop;

		let shiftLeft = ev.clientX - ev.dataTransfer.getData("X");
		let shiftTop = ev.clientY - ev.dataTransfer.getData("Y");
		if(!event.fwd)
			shiftTop--; // idk why drag and touch-drag are desynced by 1 vertical pixel 
		console.log(startLeft, startTop, shiftLeft, shiftTop);
		updateCoordinates(dropping, startLeft + shiftLeft, startTop + shiftTop);
		let regen_for = [dropping.id];
		// if in a selection, move the rest
		if(selection.includes(dropping)) {
			for(let s in selection) {
				if(selection[s] == dropping)
					continue;
				let ele = selection[s];
				let originLeft = ele.offsetLeft;
				let originTop = ele.offsetTop;
				updateCoordinates(ele, originLeft + shiftLeft, originTop + shiftTop);
				regen_for.push(ele.id);
			}
		}
		for(let r in regen_for)
			regenerateLinks(regen_for[r]);
	}

	// click/touch event handlers
	function touchHandler(ev) {
		let ele = ev.target;
		let timer = setTimeout(() => {
			dblclickHandler(ev);
		}, 500)
		ele.addEventListener("touchend", () => {clearInterval(timer)}, {once:true})
		ele.addEventListener("dragstart", () => {clearInterval(timer)}, {once:true})
	}
	function dblclickHandler(ev) {
		let ele = ev.target;
		toggleSelectionOf(ele);
	}
	function toggleSelectionOf(ele) {
		let sindex = selection.indexOf(ele);
		if(sindex < 0) {
			selection.push(ele);
			ele.classList.add("selected");
		}
		else{
			selection.splice(sindex, 1);
			ele.classList.remove("selected");
		}
		
		toggleSelectionText();
	}
	function toggleSelectionText() {
		if(selection.length == 0) {
			document.getElementById("no-selection").style.display = "";
			document.getElementById("yes-selection").style.display = "none";
		}else{
			document.getElementById("no-selection").style.display = "none";
			document.getElementById("yes-selection").style.display = "";
		}
	}
	function deselectAll() {
		for(let s in selection) {
			selection[s].classList.remove("selected");
		}
		selection = [];
		toggleSelectionText();
	}

	// line event handlers
	// begin line drawing mode
	function beginLineMode() {
		// todo, explain
		// next click is the starting point
		let canvas = document.getElementById("sketcher");
		canvas.addEventListener("click", handleSketching);
		canvas.style["z-index"] = 1001;
		let on_btn = document.getElementById("sketch-on");
		let off_btn = document.getElementById("sketch-off");
		on_btn.style.display = "none";
		off_btn.style.display = "";
	}
	// end line drawing mode
	function endLineMode() {
		if(sketching.length)
			endSketching();
		let canvas = document.getElementById("sketcher");
		canvas.removeEventListener("click", handleSketching);
		canvas.style["z-index"] = -1;		
		let on_btn = document.getElementById("sketch-on");
		let off_btn = document.getElementById("sketch-off");
		on_btn.style.display = "";
		off_btn.style.display = "none";
	}
	// clear sketcking data
	function endSketching() {
		sketching = [];
		document.body.removeEventListener("mousemove", sketchLine);
		let canvas = document.getElementById("sketcher");
		clearCanvas(canvas);
	}
	// click event handler
	function handleSketching(event) {
		if(!sketching.length) {
			// set starting coordinates and begin showing the guideline
			sketching = [event.layerX, event.layerY];
			document.body.addEventListener("mousemove", sketchLine);
		}
		else{
			// draw final line and end listening
			let grid = document.getElementById("grid");
			let x_correct = grid.offsetLeft;
			let y_correct = grid.offsetTop;
			addDraggableLine(
				sketching[0]-x_correct,
				sketching[1]-y_correct,
				event.layerX-x_correct, 
				event.layerY-y_correct,
				document.getElementById("line-color").value
			);
			endSketching();
		}
	}
	// draw the guide line on mousemove
	function sketchLine(event) {
		if(!sketching.length)
			return;
		let canvas = document.getElementById("sketcher")
		let ctx = canvas.getContext("2d");
		ctx.clearRect(0, 0, canvas.width, canvas.height);
		ctx.beginPath();
		ctx.moveTo(sketching[0], sketching[1]);
		ctx.lineTo(event.layerX, event.layerY);
		ctx.strokeStyle = '#aaa';
		ctx.lineWidth = 1;
		ctx.stroke();
	}
	
	// selection box
	function drawingSelection(ev) {
		if(ev.target.id != "grid")
			return;
		selecting_box = [ev.layerX+ev.target.offsetLeft, ev.layerY+ev.target.offsetTop];
		document.body.addEventListener("mousemove", drawSelectionBox);
	}
	function drawnSelection(ev) {
		document.body.removeEventListener("mousemove", drawSelectionBox);
		clearCanvas(document.getElementById("sketcher"));
		if(!selecting_box.length)
			return;
		let grid = document.getElementById("grid");
		selecting_box.push(...correctSelectionXY(ev));
		let bounding_top_left = {
			x: Math.min(selecting_box[0], selecting_box[2]),
			y: Math.min(selecting_box[1], selecting_box[3])
		}
		let bounding_bottom_right = {
			x: Math.max(selecting_box[0], selecting_box[2]),
			y: Math.max(selecting_box[1], selecting_box[3])
		}
		for(let e in eleSaveData) {
			let ele = document.getElementById(e);
			let rect = {
				left: ele.offsetLeft + grid.offsetLeft,
				top: ele.offsetTop + grid.offsetTop
			}
			rect.right = rect.left + ele.offsetWidth;
			rect.bottom = rect.top + ele.offsetHeight;
			
			let top_left = {x:rect.left, y:rect.top};
			let bottom_right = {x:rect.right, y:rect.bottom};
			if(!rectOverlap(bounding_top_left, bounding_bottom_right, top_left, bottom_right))
				continue;
			toggleSelectionOf(ele);
		}
		selecting_box = [];
	}
	function rectOverlap(l1, r1, l2, r2) {
		// out of left/right bound
		if(l1.x > r2.x || l2.x > r1.x)
			return false;
		// out of up/down bound
		if(r1.y < l2.y || r2.y < l1.y)
			return false;
		// in bound
		return true;
	}
	function drawSelectionBox(ev) {
		if(!selecting_box.length)
			return;
		let canvas = document.getElementById("sketcher")
		let ctx = canvas.getContext("2d");
		ctx.clearRect(0, 0, canvas.width, canvas.height);
		ctx.strokeStyle = '#000';
		ctx.lineWidth = 1;
		ctx.setLineDash([5, 3]);
		let [x, y] = correctSelectionXY(ev);
		let points = [
			[selecting_box[0], selecting_box[1]],
			[x, selecting_box[1]],
			[x, y],
			[selecting_box[0], y]
		]
		for(let p=0; p<points.length; p++) {
			let start = points[p];
			let end = points[(p+1)%points.length];
			ctx.beginPath();
			ctx.moveTo(start[0], start[1]);
			ctx.lineTo(end[0], end[1]);
			ctx.stroke();
		}
	}
	function correctSelectionXY(ev) {
		let x = ev.layerX+ev.target.offsetLeft;
		let y = ev.layerY+ev.target.offsetTop;
		if(ev.target.id != "grid") {
			let grid = document.getElementById("grid");
			x += grid.offsetLeft;
			y += grid.offsetTop;
		}
		return [x, y];
	}
	
	// edit handlers
	function editHandler() {
		
	}
	function closeModal() {
		document.getElementById("modal").style.display = "none";
	}
	function openCreate() {
		document.getElementById("modal-header").innerHTML = "<b>Creating...</b>";
		document.getElementById("modal-editor").innerHTML = "";
		document.getElementById("new-text").value = "";
		document.getElementById("new-width").value = default_width;
		document.getElementById("new-height").value = default_height;
		document.getElementById("new-z").value = 1;
		document.getElementById("modal").style.display = "";
	}
	function editLast() {
		if(!selection.length)
			return;
		openEdit(selection[selection.length-1])
	}
	function openEdit(ele) {
		document.getElementById("modal-header").innerHTML = '<b>Editing <span id="modal-editor"></span>...</b>';
		document.getElementById("modal-editor").innerHTML = ele.id;
		document.getElementById("new-text").value = unprocessText(ele);
		document.getElementById("new-width").value = ele.style.width;
		document.getElementById("new-height").value = ele.style.height;
		document.getElementById("new-z").value = ele.style["z-index"];
		document.getElementById("new-color").value = (ele.style["background-color"] || "#ffffff");
		document.getElementById("new-text-color").value = ele.style["color"];
		document.getElementById("new-font-scale").value = (ele.style["font-size"] || "1em").replace("em", "");
		document.getElementById("modal").style.display = "";
	}
	function saveModal() {
		let existing = document.getElementById("modal-editor").innerText;
		let need_regen = false;

		let text = processText(document.getElementById("new-text").value);
		let w = document.getElementById("new-width").value;
		let h = document.getElementById("new-height").value;
		if(!w)
			w = "auto";
		if(!h)
			h = "auto";
		let z = document.getElementById("new-z").value;
		let color = document.getElementById("new-color").value;
		let font_color = document.getElementById("new-text-color").value;
		let font_size = document.getElementById("new-font-scale").value;
		
		let shape = "square";
		if(document.getElementById("circle-radio").checked)
			shape = "circle";
		
		let ele;
		if(existing) {
			ele = document.getElementById(existing);
			eleSaveData[ele.id].text = text;
			eleSaveData[ele.id].w = w;
			eleSaveData[ele.id].h = h;
			if(w == "auto" || h == "auto") {
				ele.classList.add("autosize");
			}
			else{
				ele.classList.remove("autosize");
			}
			markUnsaved();
		}
		if(!ele) {
			ele = addDraggable(text, 1, 1, h, w);
		}else{
			if(ele.innerHTML != text) {
				ele.innerHTML = text;
				need_regen = true;
			}
			if(w && ele.style.width != w) {
				need_regen = true;
				ele.style.width = w;
			}
			if(h && ele.style.height != h) {
				need_regen = true;
				ele.style.height = h;
			}
			if(need_regen)
				regenerateLinks(ele.id);
		}

		if(z !== "") {
			ele.style["z-index"] = z;
			eleSaveData[ele.id].z = z;
		}
			
		if(shape == "square") {
			ele.classList.remove("round");
			delete eleSaveData[ele.id].sq;
		}
		else{
			ele.classList.add("round");
			eleSaveData[ele.id].sq = 1;
			if(w>=2*h) {
				ele.classList.add("wide");
			}else{
				ele.classList.remove("wide");
			}
			if(h>=2*w) {
				ele.classList.add("tall");
			}else{
				ele.classList.remove("tall");
			}
		}
		
		ele.style.background = color;
		if(color == "#ffffff") {
			delete eleSaveData[ele.id].back;
		}else{
			eleSaveData[ele.id].back = color;
		}
		ele.style.color = font_color;
		if(font_color != "#000000")
			eleSaveData[ele.id].font_color = font_color;
		if(!font_size)
			font_size = 1;
		ele.style["font-size"] = font_size + "em";
		if(font_size != 1)
			eleSaveData[ele.id].font_scale = font_size;

		markUnsaved();
		closeModal();
	}
	function processText(str) {
		let breaks = str.split("\n");
		if(breaks) {
			let s = '<div class="flex-line">';
			let e = '</div>';
			str = s + breaks.join(e + s) + e;
		}
		str = str.replace(/<line:?([^>]*)>/g, function(match, _1) {
			let ret = '<span class="line"'
			if(_1)
				ret += ' style="background-color:' + _1 + ';"';
			ret += '>legend</span>'
			return ret;
		})
		return str;
	}
	function unprocessText(ele) {
		let strs = [];
		for(let i=0; i<ele.children.length; i++) {
			strs.push(unprocessLegend(ele.children[i].innerHTML));
		}
		return strs.join("\n");
	}
	function unprocessLegend(str) {
		return str.replace(/<span class="line"([^>]*)>legend<\/span>/g, function(m, _1) {
			if(!_1)
				return "<line>";
			let pull = _1.match(/background-color: *([^;]+);/);
			if(!pull)
				return "<line>";
			return "<line:" + pull[1] + ">";
		})
	}
	// create containers
	// place draggable card
	function addDraggable(text, r, c, h, w, load) {
		counter++
		let ele = document.createElement("div");
		ele.id = "holder"+counter;
		if(!load && !eleSaveData.hasOwnProperty(ele.id))
			eleSaveData[ele.id] = {text:text}
		
		ele.className = "holdbox";
		ele.setAttribute("draggable", true);
		if(h == "auto" || w == "auto") {
			ele.classList.add("autosize");
		}else{
			ele.classList.remove("autosize");
		}
		if(h)
			ele.setAttribute("height", h);
		if(w)
			ele.setAttribute("width", w);
		ele.addEventListener("dragover", dragoverHandler);
		ele.addEventListener("dragstart", dragstartHandler);
		ele.addEventListener("dblclick", dblclickHandler);
		ele.addEventListener("touchstart", touchHandler);
		ele.innerHTML = text;
		document.getElementById("grid").append(ele);
		updateCoordinates(ele, r, c, h, w, load);
		return ele;
	}
	// return (but not place) a draggable canvas
	function draggableCanvas() {
		counter++;
		let ele = document.createElement("canvas");
		ele.id = "holder"+counter;
		ele.setAttribute("draggable", true);
		ele.addEventListener("dragover", dragoverHandler);
		ele.addEventListener("dragstart", dragstartHandler);
		ele.addEventListener("dblclick", dblclickHandler);
		document.getElementById("grid").appendChild(ele);
		return ele;
	}
	// place draggable canvas line
	function addDraggableLine(start_x, start_y, end_x, end_y, color = "#000", load) {
		let canvas = draggableCanvas();
		if(!load) {
			eleSaveData[canvas.id] = {
				x1: start_x,
				y1: start_y,
				x2: end_x,
				y2: end_y,
				l: 1,
				color: color
			}
			markUnsaved();
		}
		canvas.className = "hold-canvas";
		return addLine(canvas, start_x, start_y, end_x, end_y, color);
	}
	function addLine(canvas, start_x, start_y, end_x, end_y, color="#000") {
		let width = Math.abs(start_x-end_x);
		let height = Math.abs(start_y-end_y);
		
		if(height < 20)
			height = 20;
		if(width < 20)
			width = 20;
		
		canvas.height = height;
		canvas.width = width;
		
		let min_x = Math.min(start_x, end_x);
		let min_y = Math.min(start_y, end_y);
		
		let start = [start_x-min_x, start_y-min_y];
		let end = [end_x-min_x, end_y-min_y];
		
		let ctx = canvas.getContext("2d");
		ctx.beginPath();
		ctx.moveTo(start[0], start[1]);
		ctx.lineTo(end[0], end[1]);
		ctx.strokeStyle = color;
		ctx.lineWidth = 2;
		ctx.stroke();
		updateCoordinates(canvas, min_x, min_y);
		return canvas;
	}

	// move things
	// change x/y coordinates after a drop
	function updateCoordinates(ele, x, y, h, w, load) {
		if(y < 0)
			y = 0;
		if(x < 0)
			x = Math.max(x, -0.5*ele.offsetWidth);
		ele.style.left = x;
		ele.style.top = y;
		if(h) {
			ele.style.height = h;
		}
		if(w) {
			ele.style.width = w;
		}
		if(!load && eleSaveData[ele.id]) {
			eleSaveData[ele.id].r = x;
			eleSaveData[ele.id].c = y;
			if(h)
				eleSaveData[ele.id].h = h;
			if(w)
				eleSaveData[ele.id].w = w;
			markUnsaved();
		}
	}
	// reset canvas pixels
	function clearCanvas(canvas) {
		let ctx = canvas.getContext("2d");
		ctx.clearRect(0, 0, canvas.width, canvas.height);
	}
	
	// link things
	function applyLinks() {
		let kind = document.getElementById("link-logic").value;
		let color = document.getElementById("link-color").value;
		
		if(kind == "all")
			applyLinkAll(color);
		if(kind == "one")
			applyLinkOne(color);
		if(kind == "chain")
			applyLinkChain(color);
		if(kind == "loop")
			applyLinkLoop(color);
		if(kind == "purge")
			applyLinkPurge();
		if(kind == "unlink")
			applyUnlinkSelected();
		document.getElementById("link-logic").value = "none";
	}
	// link all in selection to each other
	function applyLinkAll(color) {
		for(let i=0; i<selection.length-1; i++) {
			for(let j=i+1; j<selection.length; j++) {
				linkElements(selection[i].id, selection[j].id, color);
			}
		}
	}
	// link all in selection to the first
	function applyLinkOne(color) {
		for(let i=1; i<selection.length; i++) {
			linkElements(selection[0].id, selection[i].id, color);
		}
	}
	// link all in selection to the next one
	function applyLinkChain(color) {
		for(let i=1; i<selection.length; i++) {
			linkElements(selection[i-1].id, selection[i].id, color);
		}
	}
	// link all in selection to the first one, then back around
	function applyLinkLoop(color) {
		applyLinkChain(color);
		linkElements(selection[selection.length-1].id, selection[0].id, color);
	}
	// break all links
	function applyLinkPurge() {
		for(let s in selection) {
			let id1 = selection[s].id;
			for(let id2 in links[id1]) {
				unlinkElements(id1, id2);
			}
		} 
	}
	// break all links between another selected card
	function applyUnlinkSelected() {
		for(let i=0; i<selection.length-1; i++) {
			for(let j=i+1; j<selection.length; j++) {
				if(links[selection[i].id][selection[j].id])
					unlinkElements(selection[i].id, selection[j].id);
			}
		}
	}
	function linkHandler(ev) {
		linking.push(ev.target.id);
		if(linking.length == 3) {
			linkElements(linking[1], linking[2]);
			document.getElementById(linking[1]).classList.remove("selected");
			linking = [true];
		}else{
			// todo highlight that one
			ev.target.classList.add("selected");
		}
	}
	
	function linkElements(id1, id2, color) {
		let ele1 = document.getElementById(id1);
		let ele2 = document.getElementById(id2);

		if(!links[id1])
			links[id1] = {};
		if(!links[id2])
			links[id2] = {};
		if(!links[id1].hasOwnProperty(id2)) {
			linkcount++;
			links[id1][id2] = [linkcount, (color || "#000")];
			links[id2][id1] = [linkcount, (color || "#000")];
			markUnsaved();
		}else if(color) {
			links[id1][id2][1] = color;
			links[id2][id1][1] = color;
		}
		
		let link_ele = grabLink(links[id1][id2][0]);
		generateLink(ele1, ele2, link_ele, links[id1][id2][1]);
	}
	function unlinkElements(id1, id2) {
		let connect = links[id1][id2];
		if(!connect)
			connect = links[id2][id1];
		if(!connect)
			return;
		let link_ele = grabLink(connect[0]);
		link_ele.remove();
		delete links[id1][id2];
		delete links[id2][id1];
		markUnsaved();
	}
	function generateLink(ele1, ele2, link_ele, color) {
		let start = eleCenterPoint(ele1);
		let end = eleCenterPoint(ele2);
		
		clearCanvas(link_ele);
		
		addLine(link_ele, start[0], start[1], end[0], end[1], color);
	}
	function regenerateLinks(id) {
		for(let i in links[id]) {
			linkElements(id, i);
		}
	}
	function eleCenterPoint(ele) {
		return [
			ele.offsetLeft + (0.5*ele.offsetWidth),
			ele.offsetTop + (0.5*ele.offsetHeight)
		]
	}
	function grabLink(c) {
		let ele = document.getElementById("link"+c);
		if(!ele) {
			ele = document.createElement("canvas");
			ele.id = "link"+c;
			ele.className = "linkline";
			document.getElementById("grid").appendChild(ele);
		}
		return ele;
	}
	
	// save
	function writeData() {
		let saveData = {
			ele: eleSaveData,
			links: links,
			counter: counter,
			linkcount: linkcount
		}
		localStorage.setItem("corkboard", JSON.stringify(saveData));
		// todo should make sure it doesn't overflow
		markSaved();
	}
	function markUnsaved() {
		if(autosave)
			return;
		document.getElementById("saved-span").style.display = "none";
		document.getElementById("save-span").style.display = "";
		autosave = setTimeout(() => {
			writeData();
		}, 30*1000)
	}
	function markSaved() {
		document.getElementById("saved-span").style.display = "";
		document.getElementById("save-span").style.display = "none";
		clearInterval(autosave);
		autosave = null;
	}
	function loadData() {
		let saveData = localStorage.getItem("corkboard");
		if(!saveData)
			return;
		saveData = JSON.parse(saveData);
		eleSaveData = saveData.ele;
		links = saveData.links;
		
		for(let e in eleSaveData) {
			let data = eleSaveData[e];
			let ele;
			if(data.l) {
				ele = addDraggableLine(data.x1, data.y1, data.x2, data.y2, data.color, true);
			}
			else{
				ele = addDraggable(processText(data.text), data.r, data.c, data.h, data.w, true);
			}
			
			// update other stuff
			ele.id = e;
			if(data.z)
				ele.style["z-index"] = data.z;
			if(data.back)
				ele.style["background"] = data.back;
			if(data.font_color)
				ele.style["color"] = data.font_color;
			if(data.font_scale)
				ele.style["font-size"] = data.font_scale + "em";
			if(data.sq) {
				ele.classList.add("round");
				if(data.w>=2*data.h)
					ele.classList.add("wide");
				if(data.h>=2*data.w)
					ele.classList.add("tall");
			}
			// anchors
		}
		if(saveData.counter)
			counter = saveData.counter;
		if(saveData.linkcount)
			linkcount = saveData.linkcount;
		
		let genned = {};
		for(let l in links) {
			for(let m in links[l]) {
				let revKey = m + "-" + l;
				if(genned[revKey])
					continue;
				let key = l + "-" + m;
				genned[key] = true;
				linkElements(l, m);
			}
		}
		
		markSaved();
	}
	function confirmDelete() {
		if(selection.length == 0)
			return;
		if(confirm("Delete all " + selection.length + " selected cards?"))
			deleteSelection();
	}
	function deleteSelection() {
		for(let s in selection) {
			let id = selection[s].id;
			delete eleSaveData[id];
			for(let oid in links[id]) {
				let elen = links[oid][id][0];
				ele = grabLink(elen);
				ele.remove();
				delete links[oid][id];
			}
			delete links[id];
			selection[s].remove();
		}
		
		selection = [];
		toggleSelectionText();
		markUnsaved();
	}
	// debug
	function debugDraggable(text, size) {
		addDraggable(text, 1, 1, size, size);
	}
	
	
</script>
</head>
<body onload="newInit()">
	<div id="header">
		<span id="ribbon">
		<input type="button" value="Create a card" onclick="openCreate()" title="Create a new draggable card"> 
		<span id="sketch-on"><input type="button" value="Draw lines" onclick="beginLineMode()" title="Click two points on the canvas to draw a draggable line"> </span>
		<span id="sketch-off" style="display:none;">
			<input type="button" value="Cancel lines" onclick="endLineMode()" title="Click the canvas to create endpoints, or this button to cancel drawing"> 
		</span>
		<input id="line-color" type="color">  
		<span id="no-selection"> <span id="dbl">Double click</span> one or more cards/lines to edit or multi-move.</span>
		<span id="yes-selection" style="display:none;">
			<input id="deselect-cards" type="button" value="Deselect all" title="Deselect all cards" onclick="deselectAll()"> 
			<input id="edit-card" type="button" value="Edit last selected" onclick="editLast()" title="Double click cards to select them, then edit or link them."> 
			<input id="delete-cards" type="button" value="Delete all selected" title="Deletes all selected cards." onclick="confirmDelete()">
			<select id="link-logic" oninput="applyLinks()">
				<option value="none">Link Cards</option>
				<option value="all">Connect All</option>
				<option value="one">Connect to First</option>
				<option value="chain">Connect in Sequence</option>
				<option value="loop">Connect in Loop</option>
				<option value="purge">Break all Links</option>
				<option value="unlink">Break Links In Selected</option>
			</select> Link Color: 
			<input id="link-color" type="color">
		</span> 
		<span id="saved-span">
			<input type="button" id="saved-btn" value="Saved!" class="saved" title="Your corkboard has been saved.">
		</span><span id="save-span" style="display:none;">
			<input type="button" id="save-btn" value="Save changes" onclick="writeData()" title="Manually save changes if the autosave isn't working.">
		</span>
		</span>
	</div>
	<div id="grid" onmousedown="drawingSelection(event)" onmouseup="drawnSelection(event)" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
	<canvas id="sketcher"></canvas>
	<div id="dummy"></div>
	<div id="modal" style="display:none;">
		<span id="modal-header">Creating...</span><span id="modal-editor"></span> 
		<input type="button" value="Cancel" onclick="closeModal()">
		<br>
		Text:<br>
		<textarea id="new-text" style="width:23em;height:5em;"></textarea><br>
		<span class="label">Style:</span> 
		<select id="styles">
			<option value="">Select a saved style</option>
		</select><br>
		<span class="label">Height/Width:</span> <input id="new-height" class="whinput" type="number"> x <input id="new-width" class="whinput" type="number"><br>
		<span class="label">Layer:</span> <input id="new-z" class="whinput" type="number"><br>
		<span class="label">Shape:</span> 
		<input type="radio" name="shape" id="square-radio" value="Square">
		<label for="rectangle-radio">Square</label> 
		<input type="radio" name="shape" id="circle-radio" value="Round">
		<label for="circle-radio">Round</label><br>
		<span class="label">Card Color:</span> <input id="new-color" type="color" value="#ffffff"><br>
		<span class="label">Text Color:</span> <input id="new-text-color" type="color"><br>
		<span class="label">Font Scale:</span> <input id="new-font-scale" class="whimput" type="number"><br>
		<input type="button" value="Save style as..."><br>
		<br>
		<input type="button" value="Save card" onclick="saveModal()">
	</div>
</body>
</html>
